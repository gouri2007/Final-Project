<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/bootstrap.min.css">
</head>

<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <a class="navbar-brand" href="/">Cars Dealership</a>
  <ul class="navbar-nav ml-auto">
    <li class="nav-item"><a class="nav-link" href="/about">About Us</a></li>
    <li class="nav-item active"><a class="nav-link" href="/contact">Contact Us</a></li>
  </ul>
</nav>

<h2>Contact Us</h2>

<!-- Required Images -->
<div class="contact-images">
    <img src="/static/images/cars.jpeg" alt="Cars" class="contact-photo">
    <img src="/static/images/contactus.png" alt="Contact Us" class="contact-photo">
</div>

<!-- Contact Information Section -->
<div class="contact-info">
    <h3>Get in Touch</h3>
    <p>Email: support@carsdealership.com</p>
    <p>Phone: +1 555‑123‑4567</p>
    <p>Address: 500 Auto Lane, Dallas, TX 75201</p>
    <p>Working Hours: Monday – Saturday, 9:00 AM – 7:00 PM</p>
</div>

<!-- Optional Contact Form -->
<div class="contact-form">
    <h3>Send Us a Message</h3>
    <form>
        <input type="text" placeholder="Your Name" class="form-control"><br>
        <input type="email" placeholder="Your Email" class="form-control"><br>
        <textarea placeholder="Your Message" class="form-control"></textarea><br>
        <button class="btn btn-primary">Submit</button>
    </form>
</div>

</body>
</html>
